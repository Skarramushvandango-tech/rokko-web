name: Build Netcup ZIP

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Generate wallpaper manifest
        run: node scripts/generate-wallpapers.cjs

      - name: Build for Netcup (BASE_PATH = ./ — RELATIVE PFADE!)
        run: pnpm run build
        env:
          BASE_PATH: ./
          NODE_ENV: production

      - name: Create dist.zip
        run: cd dist && zip -r ../dist.zip . && cd ..

      - name: Upload dist.zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-netcup
          path: dist.zip
          retention-days: 90

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Aktueller Build (Netcup)"
          body: |
            Automatisch gebaut bei jedem Push auf `main`.

            **Download:** `dist.zip` herunterladen, entpacken, alle Dateien per FTP auf den Netcup-Server hochladen.

            Gebaut mit `BASE_PATH=/` — funktioniert direkt auf dem Root-Verzeichnis des Servers.
          files: dist.zip
          make_latest: true
          prerelease: false
