name: Build Rokko! Records

on:
  push:
    branches: ["rebuild"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build
        env:
          BASE_PATH: /
          NODE_ENV: production

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: rokko-dist
          path: dist/
